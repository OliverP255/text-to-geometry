<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text-to-Geometry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      background: #05080e;
      color: rgba(232, 240, 255, 0.9);
    }

    .lab-ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.45);
      background:
        radial-gradient(ellipse 110% 75% at 50% 115%, rgba(30, 72, 140, 0.22) 0%, transparent 52%),
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(79, 140, 255, 0.09) 0%, transparent 42%),
        linear-gradient(168deg, #04070c 0%, #0a1220 45%, #050910 100%);
    }

    .lab-ambient::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.4;
      background-image:
        linear-gradient(rgba(79, 140, 255, 0.065) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 140, 255, 0.065) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 78% 68% at 50% 44%, #000 18%, transparent 72%);
    }

    .lab-ambient::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 50% 35% at 50% 88%, rgba(79, 140, 255, 0.06) 0%, transparent 65%);
    }

    #canvas,
    #brep-canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      z-index: 1;
      touch-action: none;
    }

    #brep-canvas {
      z-index: 2;
    }

    canvas:active,
    #brep-canvas:active {
      cursor: grabbing;
    }

    #status {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top, 0px));
      left: calc(16px + env(safe-area-inset-left, 0px));
      z-index: 30;
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 11px;
      line-height: 1.5;
      letter-spacing: 0.03em;
      color: rgba(180, 200, 230, 0.55);
      pointer-events: none;
      max-width: min(560px, calc(92vw - 24px));
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.85);
    }

    #status .ok {
      color: rgba(130, 185, 255, 0.95);
    }

    #status .err {
      color: rgba(255, 160, 160, 0.92);
    }

    /* Bottom dock: prompt + actions */
    #bottom-dock {
      position: fixed;
      bottom: calc(22px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: min(720px, calc(100vw - 28px));
      padding: 0 env(safe-area-inset-left, 0px) 0 env(safe-area-inset-right, 0px);
    }

    @media (max-width: 560px) {
      #bottom-dock {
        flex-wrap: wrap;
        justify-content: center;
        row-gap: 10px;
        bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      }

      .dock-actions {
        order: 2;
        width: 100%;
        justify-content: center;
      }

      #prompt-bar {
        order: 1;
        width: 100%;
      }

      #auth-bar {
        max-width: calc(100vw - 20px);
        flex-wrap: wrap;
        justify-content: flex-end;
        row-gap: 6px;
      }

      #status {
        max-width: calc(100vw - 24px);
        padding-right: 8px;
      }
    }

    .dock-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #prompt-bar {
      position: relative;
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(6, 14, 28, 0.78);
      backdrop-filter: blur(22px) saturate(1.15);
      -webkit-backdrop-filter: blur(22px) saturate(1.15);
      border: 1px solid rgba(79, 140, 255, 0.22);
      border-radius: 14px;
      padding: 5px 6px 5px 14px;
      box-shadow:
        0 4px 28px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #prompt-bar:focus-within {
      border-color: rgba(100, 160, 255, 0.42);
      box-shadow:
        0 0 0 1px rgba(79, 140, 255, 0.2),
        0 4px 32px rgba(20, 50, 100, 0.45);
    }

    #prompt-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font: 500 14px/1.45 'Inter', sans-serif;
      color: rgba(238, 244, 255, 0.95);
      padding: 10px 0;
    }

    #prompt-input::placeholder {
      color: rgba(150, 175, 210, 0.38);
    }

    #prompt-send {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      flex-shrink: 0;
      background: linear-gradient(155deg, #3d6fd8 0%, #4f8cff 55%, #3a62c4 100%);
      border: 1px solid rgba(120, 170, 255, 0.35);
      color: #f0f6ff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.15s, transform 0.12s;
      box-shadow: 0 2px 12px rgba(40, 90, 180, 0.35);
    }

    #prompt-send:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    #prompt-send:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    #prompt-bar .spinner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(120, 160, 220, 0.2);
      border-top-color: rgba(130, 185, 255, 0.95);
      animation: spin 0.65s linear infinite;
      margin-right: 10px;
      flex-shrink: 0;
      display: none;
    }

    #prompt-bar.loading .spinner {
      display: block;
    }

    #prompt-bar.loading #prompt-send {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #dimensions {
      position: fixed;
      bottom: 92px;
      left: 20px;
      z-index: 25;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(160, 185, 220, 0.55);
      display: none;
    }

    #export-stl,
    #print-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    }

    #export-stl {
      background: rgba(8, 18, 36, 0.75);
      border: 1px solid rgba(79, 140, 255, 0.28);
      color: rgba(190, 215, 255, 0.88);
      box-shadow: 0 2px 14px rgba(0, 0, 0, 0.25);
    }

    #export-stl:hover {
      background: rgba(16, 32, 58, 0.9);
      border-color: rgba(120, 170, 255, 0.45);
      color: rgba(230, 240, 255, 0.98);
    }

    #export-stl:disabled {
      opacity: 0.45;
      cursor: wait;
    }

    #export-stl svg {
      width: 21px;
      height: 21px;
    }

    #print-btn {
      background: linear-gradient(145deg, rgba(55, 110, 210, 0.95), rgba(79, 140, 255, 0.98));
      border: 1px solid rgba(140, 185, 255, 0.45);
      color: #0a1020;
      box-shadow: 0 0 18px rgba(60, 120, 220, 0.35);
    }

    #print-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 26px rgba(79, 140, 255, 0.5);
    }

    #print-btn svg {
      width: 21px;
      height: 21px;
      stroke: #0a1020;
      stroke-width: 2.2;
    }

    #auth-bar {
      position: fixed;
      top: calc(12px + env(safe-area-inset-top, 0px));
      right: calc(14px + env(safe-area-inset-right, 0px));
      z-index: 40;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(180, 200, 230, 0.65);
      padding: 6px 12px 6px 14px;
      background: rgba(6, 14, 28, 0.55);
      border: 1px solid rgba(79, 140, 255, 0.18);
      border-radius: 999px;
      backdrop-filter: blur(14px);
    }

    #auth-bar button {
      background: rgba(20, 40, 72, 0.55);
      border: 1px solid rgba(79, 140, 255, 0.22);
      color: rgba(230, 240, 255, 0.92);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #auth-bar button:hover {
      background: rgba(40, 75, 130, 0.65);
      border-color: rgba(120, 170, 255, 0.38);
    }

    /* Modals: native <dialog> + ::backdrop (see openModal/closeModal) */
    dialog.modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      width: 100vw;
      max-width: 100vw;
      height: 100vh;
      max-height: 100vh;
      margin: 0;
      border: none;
      padding: 20px;
      padding-top: max(20px, env(safe-area-inset-top, 0px));
      padding-bottom: max(20px, env(safe-area-inset-bottom, 0px));
      box-sizing: border-box;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    dialog.modal-backdrop::backdrop {
      background: rgba(0, 0, 0, 0.55);
    }

    dialog.modal-backdrop:not([open]) {
      display: none;
    }

    .modal-panel {
      width: min(420px, 100%);
      max-height: min(90vh, 640px);
      overflow: auto;
      background: #161618;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 18px 18px 16px;
      color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .modal-panel h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 12px;
    }

    .modal-panel label {
      display: block;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 4px;
    }

    .modal-panel input,
    .modal-panel select,
    .modal-panel textarea {
      width: 100%;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #fff;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
    }

    .modal-panel textarea {
      min-height: 72px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .modal-actions button {
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .modal-actions button.primary {
      background: rgba(79, 140, 255, 0.2);
      border-color: rgba(79, 140, 255, 0.45);
      color: #a8c8ff;
    }

    .modal-err {
      font-size: 12px;
      color: #f87171;
      margin: 0 0 8px;
      min-height: 1.2em;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .auth-tabs button {
      flex: 1;
      padding: 6px;
      font-size: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      cursor: pointer;
    }

    .auth-tabs button.active {
      background: rgba(79, 140, 255, 0.15);
      border-color: rgba(79, 140, 255, 0.3);
      color: #fff;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-BELi0rLD.js"></script>
</head>

<body>
  <div class="lab-ambient" aria-hidden="true"></div>
  <div id="auth-bar">
    <span id="auth-label">Not signed in</span>
    <button type="button" id="auth-open-login">Sign in</button>
    <button type="button" id="auth-open-register">Register</button>
    <button type="button" id="auth-signout" style="display: none;">Sign out</button>
  </div>
  <div id="status">initialising…</div>
  <canvas id="canvas"></canvas>

  <div id="dimensions"></div>

  <div id="bottom-dock">
    <div class="dock-actions">
      <button type="button" id="print-btn" title="Order 3D Print">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 6 2 18 2 18 9"></polyline>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
          <rect x="6" y="14" width="12" height="8"></rect>
        </svg>
      </button>
      <button type="button" id="export-stl" title="Download STL">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
      </button>
    </div>
    <div id="prompt-bar">
      <input id="prompt-input" type="text" placeholder="Describe a shape…" autocomplete="off" spellcheck="false" />
      <div class="spinner"></div>
      <button type="button" id="prompt-send" aria-label="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M5 12l7-7 7 7" />
        </svg>
      </button>
    </div>
  </div>

  <div id="auth-modal" class="modal-backdrop" hidden inert aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-labelledby="auth-title">
      <h2 id="auth-title">Account</h2>
      <div class="auth-tabs">
        <button type="button" id="auth-tab-login" class="active">Sign in</button>
        <button type="button" id="auth-tab-register">Register</button>
      </div>
      <p class="modal-err" id="auth-err"></p>
      <form id="auth-form-login">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="username" required />
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required />
        <div class="modal-actions">
          <button type="button" id="auth-cancel">Cancel</button>
          <button type="submit" class="primary">Sign in</button>
        </div>
      </form>
      <form id="auth-form-register" style="display: none;">
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" autocomplete="email" required />
        <label for="reg-password">Password (min 8 chars)</label>
        <input id="reg-password" type="password" autocomplete="new-password" required minlength="8" />
        <div class="modal-actions">
          <button type="button" id="auth-cancel-2">Cancel</button>
          <button type="submit" class="primary">Create account</button>
        </div>
      </form>
    </div>
  </dialog>

  <dialog id="print-modal" class="modal-backdrop" aria-labelledby="print-title">
    <div class="modal-panel">
      <h2 id="print-title">Order 3D print</h2>
      <p class="modal-err" id="print-err"></p>
      <form id="print-form">
        <label for="print-scale">Scale (mm)</label>
        <input id="print-scale" type="number" min="1" max="500" value="50" step="1" required />
        <label for="print-material">Material</label>
        <select id="print-material">
          <option value="PLA">PLA</option>
          <option value="resin">Resin</option>
        </select>
        <label for="print-quality">Quality</label>
        <select id="print-quality">
          <option value="draft">Draft</option>
          <option value="normal" selected>Normal</option>
          <option value="high">High</option>
        </select>
        <label for="print-infill">Infill %</label>
        <input id="print-infill" type="number" min="0" max="100" value="20" />
        <label for="print-color">Color (optional)</label>
        <input id="print-color" type="text" placeholder="e.g. black" />
        <label for="print-delivery">Delivery</label>
        <select id="print-delivery">
          <option value="standard">Standard</option>
          <option value="next_day">Next day</option>
          <option value="same_day">Same day (urgent)</option>
        </select>
        <label for="print-name">Your name</label>
        <input id="print-name" type="text" required />
        <label for="print-address">Shipping address</label>
        <textarea id="print-address" required placeholder="Full address"></textarea>
        <div class="modal-actions">
          <button type="button" id="print-cancel">Cancel</button>
          <button type="submit" class="primary">Submit print job</button>
        </div>
      </form>
    </div>
  </dialog>

</body>

</html>
