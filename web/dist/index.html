<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text-to-Geometry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0f; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
    canvas:active { cursor: grabbing; }

    #status {
      position: fixed; top: 10px; left: 12px; z-index: 30;
      font-size: 11px; line-height: 1.45; color: rgba(255,255,255,0.45);
      pointer-events: none; max-width: min(520px, 92vw);
    }
    #status .ok { color: rgba(130, 220, 170, 0.92); }
    #status .err { color: rgba(255, 150, 150, 0.95); }

    /* ── prompt bar ────────────────────────────────────────────── */
    #prompt-bar {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      z-index: 20; width: min(520px, calc(100vw - 40px));
      display: flex; align-items: center; gap: 0;
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(18px) saturate(1.12);
      -webkit-backdrop-filter: blur(18px) saturate(1.12);
      border: 2px solid #000000;
      border-radius: 16px;
      padding: 4px 4px 4px 16px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    #prompt-bar:focus-within {
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.75), 0 0 0 4px #000000;
    }

    #prompt-input {
      flex: 1; border: none; outline: none; background: transparent;
      font: 400 14px/1.4 'Inter', sans-serif;
      color: #0a0a0a;
      padding: 10px 0;
    }
    #prompt-input::placeholder { color: rgba(0, 0, 0, 0.38); }

    #prompt-send {
      width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0;
      background: #000000;
      border: 2px solid #000000;
      color: #ffffff;
      font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    #prompt-send:hover { background: #2a2a2a; border-color: #2a2a2a; }
    #prompt-send:disabled { opacity: 0.35; cursor: not-allowed; }
    #prompt-send:disabled:hover { background: #000000; border-color: #000000; color: #ffffff; }

    #prompt-bar .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(0, 0, 0, 0.12);
      border-top-color: #000000;
      animation: spin 0.7s linear infinite;
      margin-right: 10px; flex-shrink: 0;
      display: none;
    }
    #prompt-bar.loading .spinner { display: block; }
    #prompt-bar.loading #prompt-send { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script type="module" crossorigin src="/assets/index-BgZWvzuv.js"></script>
</head>
<body>
  <div id="status">initialising…</div>
  <canvas id="canvas"></canvas>

  <div id="prompt-bar">
    <input id="prompt-input" type="text" placeholder="Describe a shape…" autocomplete="off" spellcheck="false" />
    <div class="spinner"></div>
    <button id="prompt-send" aria-label="Send">&#x2191;</button>
  </div>

</body>
</html>
