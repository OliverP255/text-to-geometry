# LiteLLM proxy: Claude Code (Anthropic /v1/messages) -> Vertex AI Z.AI GLM (MaaS).
#
# All model_name entries below map Claude-style ids to GLM so Claude Code works without
# real Anthropic Opus/Sonnet billing on this proxy. The app backend uses Vertex Opus
# directly (T2G_BACKEND=vertex in agent/inference.py) — not LiteLLM.
#
# Prerequisites:
#   export VERTEXAI_PROJECT="your-gcp-project-id"   # or rely on GOOGLE_CLOUD_PROJECT
#   Enable Vertex AI API; in Model Garden enable glm-5-maas, glm-5.1-maas (if listed), glm-4.7-maas.
#   GLM 5.1: enable publisher model glm-5.1-maas (zai-org). If your console shows a different id,
#   change x-glm51 below. Fallback: use Z.AI directly — see comment block after model_list.
#
# Auth (Vertex uses Application Default Credentials; order: GOOGLE_APPLICATION_CREDENTIALS,
# then ~/.config/gcloud/application_default_credentials.json, then GCE metadata):
#
#   On a GCE VM: instance OAuth scopes usually omit cloud-platform, so metadata tokens get
#   ACCESS_TOKEN_SCOPE_INSUFFICIENT / predict denied. Use a dedicated key file (gitignored):
#     litellm/.vertex-sa.json
#   Create once (replace PROJECT):
#     gcloud iam service-accounts create litellm-vertex --project=PROJECT
#     gcloud projects add-iam-policy-binding PROJECT \
#       --member="serviceAccount:litellm-vertex@PROJECT.iam.gserviceaccount.com" \
#       --role="roles/aiplatform.user"
#     gcloud iam service-accounts keys create litellm/.vertex-sa.json \
#       --iam-account=litellm-vertex@PROJECT.iam.gserviceaccount.com
#   run.sh sets GOOGLE_APPLICATION_CREDENTIALS when that file exists.
#
#   Optional: rm ~/.config/gcloud/application_default_credentials.json so it does not override the key.
#
#   On a laptop / outside GCE:
#     gcloud auth application-default login \
#       --scopes="https://www.googleapis.com/auth/cloud-platform,https://www.googleapis.com/auth/userinfo.email"
#     (comma-separated scopes avoids gcloud "Scope has changed" crashes in some versions.)
#
#   If you still see invalid_grant / "Account has been deleted": revoke and remove ADC, then redo one of the above.
#   Or set GOOGLE_APPLICATION_CREDENTIALS to a service-account JSON key with aiplatform.user.
#
# Run (foreground): ./litellm/run.sh
# Run in background for Claude Code: ../scripts/start-litellm-for-claude-code.sh
#   If CC shows "Unable to connect to API (ConnectionRefused)", the proxy is not listening on :4000 — start it.
# Claude Code: ANTHROPIC_BASE_URL=http://127.0.0.1:4000 and ANTHROPIC_AUTH_TOKEN=$LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  # Faster failures + less retry latency on errors (Vertex GLM still streams when CC requests stream).
  request_timeout: 120
  num_retries: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

# Shared Vertex backends (YAML merge keys)
x-glm5: &vertex_glm5
  model: vertex_ai/zai-org/glm-5-maas
  vertex_project: os.environ/VERTEXAI_PROJECT
  vertex_location: global

# GLM 5.1 (newer flagship; Claude Code: set ANTHROPIC_DEFAULT_* to glm-5.1 per Z.ai docs)
x-glm51: &vertex_glm51
  model: vertex_ai/zai-org/glm-5.1-maas
  vertex_project: os.environ/VERTEXAI_PROJECT
  vertex_location: global

x-glm47: &vertex_glm47
  model: vertex_ai/zai-org/glm-4.7-maas
  vertex_project: os.environ/VERTEXAI_PROJECT
  vertex_location: global

model_list:
  # --- GLM 5.1 (newest; point Claude Code env vars at glm-5.1 when ready) ---
  - model_name: glm-5.1
    litellm_params:
      <<: *vertex_glm51
  - model_name: glm-5-1
    litellm_params:
      <<: *vertex_glm51
  - model_name: glm-5.1-maas
    litellm_params:
      <<: *vertex_glm51
  # --- GLM 5 (stable default on Vertex MaaS) ---
  - model_name: glm-5
    litellm_params:
      <<: *vertex_glm5
  - model_name: glm-5-maas
    litellm_params:
      <<: *vertex_glm5
  # --- Claude Code / picker aliases -> GLM 5 (do not route these to real Opus here) ---
  - model_name: claude-opus-4-6
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-sonnet-4-6
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-sonnet-4-5
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-opus-4-5
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-3-5-sonnet-20241022
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-3-5-sonnet-20240620
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-3-opus-20240229
    litellm_params:
      <<: *vertex_glm5
  # Version-pinned ids Claude Code may send
  - model_name: claude-sonnet-4-5@20250929
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-opus-4-6@20250514
    litellm_params:
      <<: *vertex_glm5
  - model_name: claude-haiku-4-5@20251001
    litellm_params:
      <<: *vertex_glm47
  # --- Haiku-style aliases -> GLM 4.7 ---
  - model_name: claude-haiku-4-5
    litellm_params:
      <<: *vertex_glm47
  - model_name: claude-3-5-haiku-20241022
    litellm_params:
      <<: *vertex_glm47
  - model_name: claude-3-haiku-20240307
    litellm_params:
      <<: *vertex_glm47

# --- Optional: Z.AI API if Vertex has no glm-5.1-maas yet ---
# 1) Comment out the three GLM 5.1 Vertex entries (glm-5.1 / glm-5-1 / glm-5.1-maas) above.
# 2) Uncomment below and set ZAI_API_KEY (https://docs.litellm.ai/docs/providers/zai).
#  - model_name: glm-5.1
#    litellm_params:
#      model: zai/glm-5.1
#      api_key: os.environ/ZAI_API_KEY
